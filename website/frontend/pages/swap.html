<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Swap — FaceSwap</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

  <main class="swap-page">
    <h1>Face Swap</h1>

    <!-- Choix du modèle -->
    <div class="card">
      <p class="label">Modèle</p>
    </div>

    <!-- Upload images -->
    <div class="upload-grid">
      <div class="card">
        <p class="label">Source</p>
        <div class="dropzone"></div>
      </div>
      <div class="card">
        <p class="label">Cible</p>
        <div class="dropzone"></div>
      </div>
    </div>

    <button class="btn-primary full-width">Lancer le swap</button>

    <!-- Résultat -->
    <div class="card">
      <p class="label">Résultat</p>
      <div class="dropzone"></div>
    </div>

  </main>

</body>
</html>
