<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — DeepSwap</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">Deep<span>Swap</span></a>
  </nav>

  <main class="form-page">
    <div class="card">
      <h1>Connexion</h1>
      <form id="login-form">
        <div>
          <p class="label">Email</p>
          <input type="email" id="email" placeholder="vous@exemple.com" required>
        </div>
        <div>
          <p class="label">Mot de passe</p>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <p id="error" class="error" style="display:none"></p>
        <button type="submit" class="btn-primary">Se connecter</button>
      </form>
      <p class="form-link">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
    </div>
  </main>

  <script src="../scripts/auth.js"></script>
  <script src="../scripts/login.js"></script>
</body>
</html>
